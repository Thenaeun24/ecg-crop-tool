<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECG Crop Tool</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💓</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>ECG Crop Tool</h1>
      <p class="app-subtitle">ECG 파형 크롭 및 환자정보 합성 도구</p>
    </header>

    <!-- Step 1: Upload -->
    <section id="upload-section" class="card section-card">
      <h2>이미지 업로드</h2>
      <div id="drop-zone" class="drop-zone">
        <div class="drop-zone-content">
          <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <p class="drop-text">ECG 스캔 이미지를 여기에 드래그하세요</p>
          <p class="drop-sub">또는</p>
          <button type="button" id="file-btn" class="btn btn-primary">파일 선택</button>
          <p class="drop-hint">JPG, PNG 이미지 파일 지원</p>
        </div>
        <input type="file" id="file-input" accept="image/*" hidden>
      </div>
      <div id="loading" class="loading" style="display:none">
        <div class="spinner"></div>
        <p>이미지 처리 중...</p>
      </div>
    </section>

    <!-- Rotation Confirm Modal -->
    <div id="rotation-modal" class="modal-overlay" style="display:none">
      <div class="modal card">
        <h3>이미지 회전 확인</h3>
        <p>이미지가 세로 방향으로 되어 있습니다.<br>90도 시계방향으로 회전할까요?</p>
        <div class="btn-group modal-buttons">
          <button type="button" id="rotate-yes-btn" class="btn btn-primary">예, 회전합니다</button>
          <button type="button" id="rotate-no-btn" class="btn btn-secondary">아니오, 그대로</button>
        </div>
      </div>
    </div>

    <!-- Step 2: Edit (Crop + Patient Form) -->
    <section id="edit-section" style="display:none">
      <div class="edit-layout">
        <!-- Left Panel: Patient Info -->
        <div class="left-panel card">
          <h2>환자 정보</h2>
          <form id="patient-form" autocomplete="off">
            <div class="form-group">
              <label for="patient-name">이름</label>
              <input type="text" id="patient-name" tabindex="1" placeholder="환자 이름 입력">
            </div>
            <div class="form-group">
              <label for="patient-gender">성별</label>
              <select id="patient-gender" tabindex="2">
                <option value="M">M (남성)</option>
                <option value="F">F (여성)</option>
              </select>
            </div>
            <div class="form-group">
              <label for="patient-age">나이</label>
              <input type="number" id="patient-age" tabindex="3" placeholder="나이 입력" min="0" max="150">
            </div>
            <div class="form-group">
              <label for="patient-cc">C.C (주호소)</label>
              <input type="text" id="patient-cc" tabindex="4" placeholder="chief complaint">
            </div>
            <div class="form-group">
              <label for="extra-select">추가사항</label>
              <select id="extra-select" tabindex="5">
                <option value="none">선택안함</option>
                <option value="summary">summary</option>
                <option value="최초 리듬">최초 리듬</option>
                <option value="2차 분석 리듬">2차 분석 리듬</option>
                <option value="이송중 리듬">이송중 리듬</option>
                <option value="병원 도착 전 리듬">병원 도착 전 리듬</option>
                <option value="제세동 리듬">제세동 리듬</option>
              </select>
            </div>
            <div class="form-group" id="rhythm-group" style="display:none">
              <label for="rhythm-select">리듬 종류</label>
              <select id="rhythm-select" tabindex="6">
                <option value="asystole">asystole</option>
                <option value="PEA">PEA</option>
                <option value="V-fib">V-fib</option>
                <option value="V-tac">V-tac</option>
              </select>
            </div>
          </form>
          <div class="form-actions" style="display:flex;gap:8px;">
            <button type="button" id="reset-btn" class="btn" style="background-color:#EF4444;color:#fff;">리셋</button>
            <button type="button" id="preview-btn" class="btn btn-primary" style="flex:1;" tabindex="7">미리보기</button>
          </div>
        </div>

        <!-- Right Panel: Image Editor -->
        <div class="right-panel card">
          <div class="right-panel-header">
            <h2>이미지 편집</h2>
            <button type="button" id="new-image-btn" class="btn btn-outline btn-sm">새 이미지</button>
          </div>
          <div class="rotation-controls">
            <button type="button" id="rotate-ccw-btn" class="btn btn-secondary">↺ 반시계 90°</button>
            <button type="button" id="rotate-cw-btn" class="btn btn-secondary">↻ 시계 90°</button>
          </div>
          <div id="crop-container">
            <img id="crop-image" alt="ECG Image">
          </div>
        </div>
      </div>
    </section>

    <!-- Step 3: Preview -->
    <section id="preview-section" style="display:none">
      <div class="card section-card">
        <h2>미리보기</h2>
        <p class="hint-text">텍스트 박스를 드래그하여 위치를 이동하고, 모서리 핸들을 드래그하여 크기를 조절하세요.</p>
        <div id="preview-wrapper">
          <div id="preview-container">
            <img id="preview-image" alt="Preview">
            <div id="text-box">
              <div id="text-content"></div>
              <div class="resize-handle rh-nw" data-dir="nw"></div>
              <div class="resize-handle rh-ne" data-dir="ne"></div>
              <div class="resize-handle rh-sw" data-dir="sw"></div>
              <div class="resize-handle rh-se" data-dir="se"></div>
            </div>
          </div>
        </div>
        <div class="btn-group preview-actions">
          <button type="button" id="back-btn" class="btn btn-secondary">← 돌아가기</button>
          <button type="button" id="highlight-box-btn" class="btn" style="background-color:#EF4444;color:#fff;">강조 박스</button>
          <button type="button" id="download-btn" class="btn btn-primary btn-lg">PNG 다운로드</button>
        </div>
      </div>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
